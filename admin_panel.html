<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fox Call - لوحة التحكم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #e94560;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #0f0;
        }

        .status-dot.error {
            background: #f00;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .search-box {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .search-box h2 {
            margin-bottom: 20px;
            color: #e94560;
        }

        .search-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        input, select {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            min-width: 200px;
        }

        input:focus, select:focus {
            outline: 2px solid #e94560;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #e94560;
            color: #fff;
        }

        .btn-primary:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #0f3460;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #16213e;
        }

        .btn-danger {
            background: #dc3545;
            color: #fff;
        }

        .btn-success {
            background: #28a745;
            color: #fff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
        }

        .stat-card h3 {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #e94560;
        }

        .user-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .user-info h3 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .user-info p {
            color: #888;
            font-size: 14px;
        }

        .user-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .user-stat {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
        }

        .user-stat label {
            display: block;
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .user-stat span {
            font-size: 18px;
            font-weight: bold;
        }

        .badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-active {
            background: #28a745;
        }

        .badge-banned {
            background: #dc3545;
        }

        .call-history {
            margin-top: 20px;
        }

        .call-history h4 {
            margin-bottom: 15px;
            color: #e94560;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        th {
            background: rgba(0,0,0,0.3);
            color: #e94560;
            font-weight: bold;
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .actions button {
            padding: 8px 15px;
            font-size: 14px;
        }

        .login-form {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 15px;
        }

        .login-form h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #e94560;
        }

        .login-form input {
            width: 100%;
            margin-bottom: 20px;
        }

        .login-form button {
            width: 100%;
        }

        .error-msg {
            background: rgba(220,53,69,0.2);
            border: 1px solid #dc3545;
            color: #f00;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: #28a745;
        }

        .toast.error {
            background: #dc3545;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #888;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        .logs-section {
            margin-top: 30px;
        }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }

        .tab.active {
            background: #e94560;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div id="loginPage" class="login-form">
        <h1>🔐 لوحة التحكم</h1>
        <div id="loginError" class="error-msg" style="display: none;"></div>
        <input type="password" id="adminKey" placeholder="مفتاح الأدمن">
        <button class="btn-primary" onclick="login()">دخول</button>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" style="display: none;">
        <div class="header">
            <div class="logo">📞 Fox Call - لوحة التحكم</div>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">متصل</span>
                <button class="btn-secondary" onclick="logout()" style="margin-right: 20px;">خروج</button>
            </div>
        </div>

        <div class="container">
            <!-- Stats -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <h3>إجمالي المكالمات</h3>
                    <div class="value" id="totalCalls">-</div>
                </div>
                <div class="stat-card">
                    <h3>مكالمات ناجحة</h3>
                    <div class="value" id="successCalls">-</div>
                </div>
                <div class="stat-card">
                    <h3>إجمالي المستخدمين</h3>
                    <div class="value" id="totalUsers">-</div>
                </div>
                <div class="stat-card">
                    <h3>إجمالي الرصيد</h3>
                    <div class="value" id="totalBalance">-</div>
                </div>
            </div>

            <!-- Search -->
            <div class="search-box">
                <h2>🔍 البحث عن مستخدم</h2>
                <div class="search-row">
                    <input type="text" id="searchUserId" placeholder="معرف المستخدم (ID)">
                    <button class="btn-primary" onclick="searchUser()">بحث</button>
                    <button class="btn-secondary" onclick="loadAllUsers()">عرض الكل</button>
                    <button class="btn-success" onclick="downloadLogs()">📥 تصدير السجلات (CSV)</button>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tab-container">
                <button class="tab active" onclick="showTab('users')">👥 المستخدمين</button>
                <button class="tab" onclick="showTab('calls')">📞 المكالمات</button>
                <button class="tab" onclick="showTab('ips')">🌐 عناوين IP</button>
            </div>

            <!-- Users Tab -->
            <div id="usersTab" class="tab-content active">
                <div id="usersList">
                    <div class="loading">جاري التحميل...</div>
                </div>
            </div>

            <!-- Calls Tab -->
            <div id="callsTab" class="tab-content">
                <div id="callsList">
                    <div class="loading">جاري التحميل...</div>
                </div>
            </div>

            <!-- IPs Tab -->
            <div id="ipsTab" class="tab-content">
                <div id="ipsList">
                    <div class="loading">جاري التحميل...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- User Details Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">تفاصيل المستخدم</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let adminKey = localStorage.getItem('adminKey') || '';
        let currentUsers = [];

        // Check if already logged in
        if (adminKey) {
            validateKey();
        }

        async function validateKey() {
            try {
                const res = await fetch(`${API_URL}/api/admin/stats`, {
                    headers: { 'x-admin-key': adminKey }
                });
                if (res.ok) {
                    showDashboard();
                } else {
                    localStorage.removeItem('adminKey');
                    adminKey = '';
                }
            } catch (e) {
                console.log('Validation failed');
            }
        }

        function login() {
            const key = document.getElementById('adminKey').value;
            if (!key) {
                showError('الرجاء إدخال مفتاح الأدمن');
                return;
            }
            adminKey = key;
            localStorage.setItem('adminKey', key);
            validateKey();
        }

        function logout() {
            localStorage.removeItem('adminKey');
            adminKey = '';
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }

        function showError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.style.display = 'block';
        }

        async function showDashboard() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('statusDot').classList.remove('error');
            await loadStats();
            await loadAllUsers();
        }

        async function api(endpoint, options = {}) {
            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    ...options,
                    headers: {
                        'x-admin-key': adminKey,
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                if (res.status === 403) {
                    logout();
                    throw new Error('مفتاح الأدمن غير صحيح');
                }
                return await res.json();
            } catch (e) {
                showToast(e.message, 'error');
                throw e;
            }
        }

        async function loadStats() {
            try {
                const stats = await api('/api/admin/stats');
                document.getElementById('totalCalls').textContent = stats.total_calls || 0;
                document.getElementById('successCalls').textContent = stats.success_calls || 0;
                document.getElementById('totalUsers').textContent = stats.total_users || 0;
                document.getElementById('totalBalance').textContent = `$${(stats.total_balance || 0).toFixed(2)}`;
            } catch (e) {
                console.log('Stats load failed');
            }
        }

        async function loadAllUsers() {
            const container = document.getElementById('usersList');
            container.innerHTML = '<div class="loading">جاري التحميل...</div>';

            try {
                const data = await api('/api/admin/users');
                currentUsers = data.users || [];

                if (currentUsers.length === 0) {
                    container.innerHTML = '<div class="empty-state">لا يوجد مستخدمين</div>';
                    return;
                }

                container.innerHTML = currentUsers.map(user => `
                    <div class="user-card">
                        <div class="user-header">
                            <div class="user-info">
                                <h3>${user.full_name || user.username || 'مستخدم'}</h3>
                                <p>ID: ${user.user_id} | @${user.username || 'غير محدد'}</p>
                            </div>
                            <div>
                                <span class="badge ${user.is_banned ? 'badge-banned' : 'badge-active'}">
                                    ${user.is_banned ? 'محظور' : 'نشط'}
                                </span>
                            </div>
                        </div>
                        <div class="user-stats">
                            <div class="user-stat">
                                <label>الرصيد</label>
                                <span>$${(user.balance || 0).toFixed(2)}</span>
                            </div>
                            <div class="user-stat">
                                <label>IP最后一次</label>
                                <span style="font-size: 14px; direction: ltr;">${user.last_ip || 'غير معروف'}</span>
                            </div>
                            <div class="user-stat">
                                <label>آخر ظهور</label>
                                <span>${user.last_seen || 'غير معروف'}</span>
                            </div>
                            <div class="user-stat">
                                <label>إجمالي المكالمات</label>
                                <span>${user.total_calls || 0}</span>
                            </div>
                        </div>
                        <div class="actions" style="margin-top: 15px;">
                            <button class="btn-secondary" onclick="viewUser('${user.user_id}')">عرض التفاصيل</button>
                            ${user.is_banned
                                ? `<button class="btn-success" onclick="unbanUser('${user.user_id}')">إلغاء الحظر</button>`
                                : `<button class="btn-danger" onclick="banUser('${user.user_id}')">حظر</button>`
                            }
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<div class="error-msg">فشل تحميل المستخدمين</div>';
            }
        }

        async function searchUser() {
            const userId = document.getElementById('searchUserId').value.trim();
            if (!userId) {
                showToast('الرجاء إدخال معرف المستخدم', 'error');
                return;
            }

            const container = document.getElementById('usersList');
            container.innerHTML = '<div class="loading">جاري البحث...</div>';

            try {
                const user = await api(`/api/admin/user/${userId}`);
                container.innerHTML = `
                    <div class="user-card">
                        <div class="user-header">
                            <div class="user-info">
                                <h3>${user.full_name || user.username || 'مستخدم'}</h3>
                                <p>ID: ${user.user_id} | @${user.username || 'غير محدد'}</p>
                            </div>
                            <div>
                                <span class="badge ${user.is_banned ? 'badge-banned' : 'badge-active'}">
                                    ${user.is_banned ? 'محظور' : 'نشط'}
                                </span>
                            </div>
                        </div>
                        <div class="user-stats">
                            <div class="user-stat">
                                <label>الرصيد</label>
                                <span>$${(user.balance || 0).toFixed(2)}</span>
                            </div>
                            <div class="user-stat">
                                <label>IP</label>
                                <span style="font-size: 14px; direction: ltr;">${user.ip_address || 'غير معروف'}</span>
                            </div>
                            <div class="user-stat">
                                <label>最后一次登录</label>
                                <span>${user.last_login || 'غير معروف'}</span>
                            </div>
                            <div class="user-stat">
                                <label>معرف الجهاز</label>
                                <span style="font-size: 12px;">${user.device_id || 'غير معروف'}</span>
                            </div>
                        </div>
                        ${user.call_history && user.call_history.length > 0 ? `
                            <div class="call-history">
                                <h4>📞 آخر المكالمات</h4>
                                <table>
                                    <thead>
                                        <tr>
                                            <th>الرقم</th>
                                            <th>من</th>
                                            <th>المدة</th>
                                            <th>الحالة</th>
                                            <th>الوقت</th>
                                            <th>IP</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${user.call_history.map(call => `
                                            <tr>
                                                <td>${call.to}</td>
                                                <td>${call.from}</td>
                                                <td>${call.duration} ثانية</td>
                                                <td>${call.status}</td>
                                                <td>${call.timestamp || call.start_time}</td>
                                                <td style="font-size: 11px;">${call.ip_address || '-'}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        ` : ''}
                        <div class="actions" style="margin-top: 15px;">
                            <button class="btn-secondary" onclick="viewUser('${user.user_id}')">عرض التفاصيل</button>
                            ${user.is_banned
                                ? `<button class="btn-success" onclick="unbanUser('${user.user_id}')">إلغاء الحظر</button>`
                                : `<button class="btn-danger" onclick="banUser('${user.user_id}')">حظر</button>`
                            }
                        </div>
                    </div>
                `;
            } catch (e) {
                container.innerHTML = `<div class="error-msg">المستخدم غير موجود أو حدث خطأ</div>`;
            }
        }

        async function viewUser(userId) {
            try {
                const user = await api(`/api/admin/user/${userId}`);
                document.getElementById('modalTitle').textContent = `用户: ${user.username || user.user_id}`;
                document.getElementById('modalContent').innerHTML = `
                    <div class="user-stats" style="margin-bottom: 20px;">
                        <div class="user-stat">
                            <label>ID</label>
                            <span>${user.user_id}</span>
                        </div>
                        <div class="user-stat">
                            <label>用户名</label>
                            <span>@${user.username || '-'}</span>
                        </div>
                        <div class="user-stat">
                            <label>الرصيد</label>
                            <span>$${(user.balance || 0).toFixed(2)}</span>
                        </div>
                        <div class="user-stat">
                            <label>IP</label>
                            <span style="font-size: 12px;">${user.ip_address || '-'}</span>
                        </div>
                        <div class="user-stat">
                            <label>注册日期</label>
                            <span>${user.registration_date || '-'}</span>
                        </div>
                        <div class="user-stat">
                            <label>最后一次登录</label>
                            <span>${user.last_login || '-'}</span>
                        </div>
                    </div>

                    ${user.call_history && user.call_history.length > 0 ? `
                        <h4 style="margin: 20px 0 10px;">📞 المكالمات (${user.call_history.length})</h4>
                        <table>
                            <thead>
                                <tr>
                                    <th>الرقم</th>
                                    <th>المدة</th>
                                    <th>IP</th>
                                    <th>الوقت</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${user.call_history.map(call => `
                                    <tr>
                                        <td>${call.to}</td>
                                        <td>${call.duration}s</td>
                                        <td style="font-size: 10px;">${call.ip_address || '-'}</td>
                                        <td>${call.timestamp || '-'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    ` : '<p style="color: #888;">لا توجد مكالمات</p>'}
                `;
                document.getElementById('userModal').classList.add('active');
            } catch (e) {
                showToast('فشل تحميل تفاصيل المستخدم', 'error');
            }
        }

        function closeModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        async function banUser(userId) {
            if (!confirm('هل أنت متأكد من حظر هذا المستخدم؟')) return;
            try {
                await api(`/api/admin/ban/${userId}`, { method: 'POST' });
                showToast('تم حظر المستخدم بنجاح', 'success');
                loadAllUsers();
            } catch (e) {
                showToast('فشل حظر المستخدم', 'error');
            }
        }

        async function unbanUser(userId) {
            try {
                await api(`/api/admin/unban/${userId}`, { method: 'POST' });
                showToast('تم إلغاء الحظر بنجاح', 'success');
                loadAllUsers();
            } catch (e) {
                showToast('فشل إلغاء الحظر', 'error');
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`.tab[onclick="showTab('${tab}')"]`).classList.add('active');
            document.getElementById(`${tab}Tab`).classList.add('active');

            if (tab === 'calls') loadCallsLog();
            if (tab === 'ips') loadIPsLog();
        }

        async function loadCallsLog() {
            const container = document.getElementById('callsList');
            container.innerHTML = '<div class="loading">جاري التحميل...</div>';

            try {
                const data = await api('/api/admin/all-calls');
                const calls = data.calls || [];

                if (calls.length === 0) {
                    container.innerHTML = '<div class="empty-state">لا توجد مكالمات</div>';
                    return;
                }

                container.innerHTML = `
                    <div class="search-box">
                        <input type="text" id="callSearch" placeholder="بحث بالرقم أو User ID..." onkeyup="filterCalls()">
                        <button class="btn-success" onclick="downloadCallsCSV()">📥 تصدير CSV</button>
                    </div>
                    <table id="callsTable">
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>الرقم</th>
                                <th>من</th>
                                <th>المدة</th>
                                <th>الحالة</th>
                                <th>IP</th>
                                <th>الوقت</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${calls.map(call => `
                                <tr>
                                    <td>${call.user_id}</td>
                                    <td>${call.to}</td>
                                    <td>${call.from}</td>
                                    <td>${call.duration}s</td>
                                    <td>${call.status}</td>
                                    <td style="font-size: 10px;">${call.ip_address || '-'}</td>
                                    <td>${call.timestamp || call.start_time}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                container.innerHTML = '<div class="error-msg">فشل تحميل السجلات</div>';
            }
        }

        async function loadIPsLog() {
            const container = document.getElementById('ipsList');
            container.innerHTML = '<div class="loading">جاري التحميل...</div>';

            try {
                const data = await api('/api/admin/ips');
                const ips = data.ips || [];

                if (ips.length === 0) {
                    container.innerHTML = '<div class="empty-state">لا توجد عناوين IP</div>';
                    return;
                }

                container.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>IP</th>
                                <th>User ID</th>
                                <th>المستخدم</th>
                                <th>آخر ظهور</th>
                                <th>إجمالي المكالمات</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${ips.map(ip => `
                                <tr>
                                    <td style="direction: ltr;">${ip.ip}</td>
                                    <td>${ip.user_id}</td>
                                    <td>@${ip.username || '-'}</td>
                                    <td>${ip.last_seen}</td>
                                    <td>${ip.total_calls}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                container.innerHTML = '<div class="error-msg">فشل تحميل IP</div>';
            }
        }

        function filterCalls() {
            const query = document.getElementById('callSearch').value.toLowerCase();
            const rows = document.querySelectorAll('#callsTable tbody tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(query) ? '' : 'none';
            });
        }

        function downloadLogs() {
            downloadCallsCSV();
        }

        function downloadCallsCSV() {
            const table = document.getElementById('callsTable');
            if (!table) {
                showToast('لا توجد بيانات للتصدير', 'error');
                return;
            }

            let csv = 'User ID,الرقم,من,المدة,الحالة,IP,الوقت\n';
            table.querySelectorAll('tbody tr').forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length >= 7) {
                    csv += `${cells[0].textContent},${cells[1].textContent},${cells[2].textContent},${cells[3].textContent},${cells[4].textContent},${cells[5].textContent},${cells[6].textContent}\n`;
                }
            });

            downloadFile(csv, 'call_logs.csv', 'text/csv');
            showToast('تم تصدير السجلات بنجاح', 'success');
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Close modal on outside click
        document.getElementById('userModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
